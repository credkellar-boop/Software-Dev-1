name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        # Cache mechanism temporarily removed to prevent lock file errors

    - name: Install Dependencies
      # Changed from 'npm ci' to 'npm install' to bypass the need for package-lock.json
      run: npm install

    - name: Run Build
      run: npm run build --if-present

    - name: Execute Tests
      run: npm test
